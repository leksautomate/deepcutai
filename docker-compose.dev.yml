version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder  # Use builder stage for development
    container_name: deepcut-ai-dev
    restart: unless-stopped
    ports:
      - "5000:5000"
      - "5173:5173"  # Vite dev server
    environment:
      - NODE_ENV=development
      - PORT=5000
      - HOST=0.0.0.0
      - DATABASE_URL=postgresql://deepcut:devpassword@db:5432/deepcutai
      - SESSION_SECRET=dev-secret-change-in-production
      - COOKIE_SECURE=false
    volumes:
      # Mount source code for hot reload
      - ./client:/app/client
      - ./server:/app/server
      - ./shared:/app/shared
      - ./assets:/app/assets
      - ./data:/app/data
      - ./logs:/app/logs
      # Prevent overwriting node_modules
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dev-network
    command: npm run dev

  db:
    image: postgres:16-alpine
    container_name: deepcut-db-dev
    restart: unless-stopped
    ports:
      - "5432:5432"  # Expose for local tools (e.g., pgAdmin)
    environment:
      - POSTGRES_USER=deepcut
      - POSTGRES_PASSWORD=devpassword
      - POSTGRES_DB=deepcutai
    volumes:
      - dev_postgres_data:/var/lib/postgresql/data
    networks:
      - dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deepcut -d deepcutai"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  dev-network:
    driver: bridge

volumes:
  dev_postgres_data:
