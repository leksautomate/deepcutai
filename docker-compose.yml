# DeepCut AI Docker Compose Configuration

services:
  # Main application service
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: deepcut-ai
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5000}:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - HOST=0.0.0.0
      - DATABASE_URL=postgresql://deepcut:${DB_PASSWORD:-changeme}@db:5432/deepcutai
      - SESSION_SECRET=${SESSION_SECRET:-change-this-secret}
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
      # API Keys (optional - can be configured via Settings UI)
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - SPEECHIFY_API_KEY=${SPEECHIFY_API_KEY:-}
      - INWORLD_API_KEY=${INWORLD_API_KEY:-}
      - FREEPIK_API_KEY=${FREEPIK_API_KEY:-}
      - WAVESPEED_API_KEY=${WAVESPEED_API_KEY:-}
      - RUNPOD_API_KEY=${RUNPOD_API_KEY:-}
      - POLLINATIONS_API_KEY=${POLLINATIONS_API_KEY:-}
    volumes:
      - ./assets:/app/assets
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - frontend
      - backend
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/setup/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL database
  db:
    image: postgres:16-alpine
    container_name: deepcut-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=deepcut
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme}
      - POSTGRES_DB=deepcutai
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend  # Internal network only - not exposed to frontend
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deepcut -d deepcutai"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Optional: Nginx reverse proxy
  # Uncomment if you want to use Nginx in Docker
  # nginx:
  #   image: nginx:alpine
  #   container_name: deepcut-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./nginx/conf.d:/etc/nginx/conf.d:ro
  #     - ./nginx/ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - app
  #   networks:
  #     - frontend
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: '0.5'
  #         memory: 256M

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true  # Backend network is not exposed externally

volumes:
  postgres_data:
    driver: local
